<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Scout</title>
    <link rel="icon" href="assets/icons/scout-32.png">
    <link rel="stylesheet" href="popup.css">
    <link rel="stylesheet" href="shared/tour.css">
  </head>
  <body>
    <main>
      <section class="profile-strip">
        <label><span>ACTIVE PROFILE</span><select id="profile-select"></select></label>
        <button id="onboarding" type="button">Setup</button>
        <span id="ai-status" class="ai-status">AI OFF</span>
      </section>

      <section class="page-state">
        <div>
          <p class="eyebrow" id="site-label">READING THIS PAGE</p>
          <label class="editable-title"><span>Role</span><input id="role" placeholder="Job title"></label>
          <label class="editable-company"><span>Company</span><input id="company" placeholder="Company"></label>
        </div>
        <div class="score" id="score" aria-label="Resume match score"><strong>-</strong><span>MATCH</span></div>
      </section>

      <div id="confidence" class="confidence">Waiting for page details…</div>

      <section id="record-controls" class="record-controls hidden">
        <label><span>Status</span><select id="status"></select></label>
        <div><span>Next follow-up</span><strong id="follow-up">Not scheduled</strong></div>
      </section>

      <section class="actions">
        <button id="save" class="primary" data-tour-target="save-job" type="button" disabled><span>Save to Scout</span><span>＋</span></button>
        <button id="fill" class="secondary" data-tour-target="autofill" type="button" disabled><span>Autofill application</span><span>↗</span></button>
        <button id="agent" class="secondary ai-action hidden" type="button" disabled><span>Optional AI enhancement</span><span>✦</span></button>
        <button id="applied" class="secondary dark" data-tour-target="mark-applied" type="button" disabled><span>Mark as applied</span><span>✓</span></button>
        <button id="report" class="report-action" data-tour-target="report-problem" type="button"><span>Report a site problem</span><span>!</span></button>
      </section>

      <div id="result" class="result" role="status" aria-live="polite"></div>

    </main>
    <script src="shared/constants.js"></script>
    <script src="shared/matching.js"></script>
    <script src="shared/followup.js"></script>
    <script src="shared/profiles.js"></script>
    <script src="shared/ai.js"></script>
    <script src="shared/storage.js"></script>
    <script src="shared/tour.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
